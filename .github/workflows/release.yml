name: Release

permissions:
  contents: write

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/**'
      - 'DLL_DEP/*'
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - id: ver
        run: |
          $c = Get-Content Cargo.toml -Raw
          if ($c -notmatch 'version\s*=\s*"([^"]+)"') { exit 1 }
          "version=$($Matches[1])" >> $env:GITHUB_OUTPUT

      - name: Check formatting
        run: cargo fmt --all -- --check

      # Do not use --all-features here: branding assets are private/local only.
      - name: Run clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked

      - run: cargo build --release --locked

      # Zips named like the exe basename: …-vVERSION.zip; contents = that exe + DLL_DEP files at root.
      - run: |
          $ErrorActionPreference = "Stop"
          $v = "${{ steps.ver.outputs.version }}"
          function Pack([string]$exe, [string]$zipName) {
            $d = "_pkg"
            Remove-Item $d -Recurse -Force -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Path $d | Out-Null
            Copy-Item $exe $d
            Copy-Item DLL_DEP/* $d -Recurse
            Compress-Archive -Force -Path (Join-Path $d '*') -DestinationPath $zipName
            Remove-Item $d -Recurse -Force
          }
          Pack target/release/dma-speedtest-memflow-rs.exe "dma-speedtest-memflow-rs-v$v.zip"
          Pack target/release/cli-dma-speedtest-memflow-rs.exe "cli-dma-speedtest-memflow-rs-v$v.zip"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dma-speedtest-memflow-rs-v${{ steps.ver.outputs.version }}.zip
            cli-dma-speedtest-memflow-rs-v${{ steps.ver.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
