name: Release

permissions:
  contents: write

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/**'
      - 'DLL_DEP/*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly

      - name: Get Version
        id: get_version
        run: |
          if (Test-Path -Path "Cargo.toml") {
            $content = Get-Content -Path Cargo.toml -Raw
            if ($content -match 'version\s*=\s*"([^"]+)"') {
              $version = $matches[1]
              echo "version=$version" >> $env:GITHUB_OUTPUT
              echo "Found version: $version"
            } else {
              echo "::error::Could not extract version from Cargo.toml"
              exit 1
            }
          } else {
            echo "::error::Cargo.toml file not found"
            exit 1
          }

      - name: Build Release
        run: cargo build --release


      - name: Zip GUI and CLI
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ steps.get_version.outputs.version }}"

          function New-BinZip([string]$exePath, [string]$zipPath) {
            $pkgDir = "bin-package"
            Remove-Item $pkgDir -Recurse -Force -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Path $pkgDir | Out-Null
            Copy-Item $exePath -Destination $pkgDir
            if (Test-Path "DLL_DEP") {
              Copy-Item "DLL_DEP/*" -Destination $pkgDir -Recurse
            } else {
              throw "DLL_DEP/ not found"
            }
            Remove-Item $zipPath -Force -ErrorAction SilentlyContinue
            Compress-Archive -Path "$pkgDir/*" -DestinationPath $zipPath
          }

          New-BinZip "target/release/dma-speedtest-memflow-rs.exe" "[ GUI ] dma-speedtest-memflow-rs-v$version.zip"
          New-BinZip "target/release/cli-dma-speedtest-memflow-rs.exe" "[ CLI ] dma-speedtest-memflow-rs-v$version.zip"

      - name: Verify zips
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ steps.get_version.outputs.version }}"
          $guiZip = "[ GUI ] dma-speedtest-memflow-rs-v$version.zip"
          $cliZip = "[ CLI ] dma-speedtest-memflow-rs-v$version.zip"

          function Assert-Zip([string]$zip, [string]$expectedExe) {
            $dest = "zip-check"
            Remove-Item $dest -Recurse -Force -ErrorAction SilentlyContinue
            Expand-Archive -LiteralPath $zip -DestinationPath $dest -Force
            if (-not (Test-Path (Join-Path $dest $expectedExe))) {
              throw "Missing '$expectedExe' in $zip"
            }
            if (Test-Path (Join-Path $dest "DLL_DEP")) {
              throw "DLL_DEP directory must not exist inside $zip"
            }
            $dllCount = @(Get-ChildItem -LiteralPath $dest -Filter *.dll -File).Count
            if ($dllCount -lt 1) {
              throw "No DLLs at zip root in $zip"
            }
          }

          Assert-Zip $guiZip "dma-speedtest-memflow-rs.exe"
          Assert-Zip $cliZip "cli-dma-speedtest-memflow-rs.exe"

      - name: Create release tag and notes
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          tag_name: v${{ steps.get_version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload prefixed zip assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ steps.get_version.outputs.version }}"
          $gui = "[ GUI ] dma-speedtest-memflow-rs-v$version.zip"
          $cli = "[ CLI ] dma-speedtest-memflow-rs-v$version.zip"
          gh release upload ("v{0}" -f $version) "$gui" "$cli" --repo ${{ github.repository }} --clobber

